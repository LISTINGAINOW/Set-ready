# PR Quality Checks
# Runs on all pull requests to main branch
# Blocks merging until all checks pass

name: PR Quality Checks

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ===========================================
  # TYPE CHECK - Catch TypeScript errors
  # ===========================================
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # ===========================================
  # LINT - Catch code quality issues
  # ===========================================
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: false

      - name: ESLint Summary
        if: failure()
        run: |
          echo "::error::ESLint found issues. Please fix them before merging."
          echo "Run 'npm run lint' locally to see the full report."

  # ===========================================
  # BUILD - Ensure project compiles
  # ===========================================
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Disable telemetry for CI
          NEXT_TELEMETRY_DISABLED: 1
          # Minimal env vars for build (adjust as needed)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build Summary
        if: success()
        run: echo "✅ Build completed successfully"

  # ===========================================
  # SECURITY - Check for vulnerabilities
  # ===========================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for known vulnerabilities
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true

  # ===========================================
  # BUNDLE SIZE - Track bundle impact (optional)
  # ===========================================
  bundle-size:
    name: Bundle Size Check
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Analyze bundle
        run: |
          echo "📦 Bundle size analysis"
          echo "For detailed bundle analysis, run locally:"
          echo "  npm install -g @next/bundle-analyzer"
          echo "  ANALYZE=true npm run build"
        continue-on-error: true

  # ===========================================
  # TESTS - Run test suite (when tests exist)
  # ===========================================
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    if: hashFiles('**/*.test.ts', '**/*.test.tsx', '**/*.spec.ts', '**/*.spec.tsx') != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Test Summary
        if: failure()
        run: |
          echo "::warning::Tests failed or test framework not configured"
          echo "Consider adding tests for new features"

  # ===========================================
  # PR REVIEW CHECKLIST - Post checklist comment
  # ===========================================
  pr-checklist:
    name: PR Review Checklist
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post Review Checklist
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## 🦔 PR Review Checklist')
            );
            
            const checklist = `## 🦔 PR Review Checklist
            
            ### Automated Checks (must pass before merge)
            - [ ] TypeScript compiles without errors
            - [ ] ESLint passes with no warnings
            - [ ] Build completes successfully
            - [ ] No moderate+ security vulnerabilities
            
            ### Manual Review Items
            - [ ] Changes are focused (not mixing unrelated features)
            - [ ] Breaking changes are documented
            - [ ] New dependencies are necessary and trusted
            - [ ] Environment variables are documented (if any added)
            - [ ] Database migrations are reversible (if any)
            
            ### Testing
            - [ ] New features have manual test confirmation
            - [ ] Edge cases are considered
            - [ ] Error handling is appropriate
            
            ---
            *This checklist is auto-generated. Check items as you review.*`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: checklist
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: checklist
              });
            }

  # ===========================================
  # STATUS SUMMARY - Final pass/fail
  # ===========================================
  status:
    name: PR Status
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build]
    if: always()
    steps:
      - name: Check Status
        run: |
          if [[ "${{ needs.typecheck.result }}" != "success" ]]; then
            echo "❌ TypeScript check failed"
            exit 1
          fi
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "❌ Lint check failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All quality checks passed!"
