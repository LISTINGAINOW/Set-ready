<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discreet Set — Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%);
        color: #0f172a;
      }
      main {
        max-width: 32rem;
        margin: 2rem;
        padding: 2rem;
        border: 1px solid #0f172a;
        border-radius: 1.75rem;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.04em;
      }
      p {
        margin: 0 0 1rem;
        line-height: 1.7;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0.85rem 1.2rem;
        border-radius: 999px;
        background: #3b82f6;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You’re offline.</h1>
      <p>Discreet Set saved a few essentials for offline use, but live listings and messages need a connection.</p>
      <p>Reconnect, then reload to keep scouting.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
